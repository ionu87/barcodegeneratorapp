name: Deploy UI Preview

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write      # Required for direct hosting
  id-token: write   # Required for security handshake

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Web Version
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Ensure this is where your 'npm run build' puts files!

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
